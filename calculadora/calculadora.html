
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .campo {
            background-color: rgb(235, 109, 185);
            border: 5px solid rgb(179, 21, 124);
        }
        
        .botao {
            width: 5%;
            height: 3%;
            background-color: rgb(255, 106, 165);
            border: 1.5px solid rgb(0, 0, 0);
        }
        
        .botao2 {
            width: 5%;
            height: 10%;
            background-color: rgb(217, 57, 121);
            border: 1.5px solid rgb(0, 0, 0);
        }
        
        .botao3 {
            width: 5%;
            height: 3%;
            background-color: rgb(206, 39, 139);
            border: 1.5px solid rgba(0, 0, 0, 0.8);
        }
        
        .botao4 {
            width: 5%;
            height: 3%;
            background-color: rgb(245, 107, 192);
            border: 1.5px solid rgb(0, 0, 0);
        }
    </style>
    <script>
        function adicionar(valor){
            document.getElementById("campo").value += valor;
        }
        function limpar(){
            document.getElementById("campo").value = "";
        }
        function calcular(){
            var campo = document.getElementById("campo");
            try{
               campo.value = eval(campo.value); 
            }catch(error){
                campo.value ="Erro";
            }
        }
    </script>
</head>
<body>
    <fieldset>
        <legend>CALCULADORA DA ANINHA</legend>
        <input type="text" id="campo" onclick="adicionar('1')" class="campo"><br><br>
        <button onclick="adicionar('1')" class="botao">1</button>
        <button onclick="adicionar('2')" class="botao">2</button>
        <button onclick="adicionar('3')" class="botao">3</button>
        <button onclick="adicionar('*')" class="botao2">x</button>
        <button onclick="adicionar('^')" class="botao2">^</button>
        <br>
        <button onclick="adicionar('4')" class="botao">4</button>
        <button onclick="adicionar('5')" class="botao">5</button>
        <button onclick="adicionar('6')" class="botao">6</button>
        <button onclick="adicionar('/')" class="botao2">/</button>
        <button onclick="adicionar('(')" class="botao2">(</button>
        <br>
        <button onclick="adicionar('7')" class="botao">7</button>
        <button onclick="adicionar('8')" class="botao">8</button>
        <button onclick="adicionar('9')" class="botao">9</button>
        <button onclick="adicionar('+')" class="botao2">+</button>
        <button onclick="adicionar(')')" class="botao2">)</button>
        <br>
        <button onclick="adicionar('.')" class="botao2">.</button>
        <button onclick="adicionar('0')" class="botao">0</button>
        <button onclick="adicionar(',')" class="botao2">,</button>
        <button onclick="adicionar('-')" class="botao2">-</button>
        <button onclick="adicionar('%')" class="botao2">%</button>
        <br>
        <button onclick="limpar()" class="botao3">C</button>
        <button onclick="calcular()" class="botao4">=</button>
    </fieldset>
</body>
</html>
