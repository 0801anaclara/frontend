<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .campo {
            background-color: rgb(235, 109, 185);
            border: 5px solid rgb(179, 21, 124);
        }
        
        .botao {
            width: 5%;
            height: 3%;
            background-color: rgb(255, 106, 165);
            border: 1.5px solid rgb(0, 0, 0);
        }
        
        .botao2 {
            width: 5%;
            height: 10%;
            background-color: rgb(217, 57, 121);
            border: 1.5px solid rgb(0, 0, 0);
        }
        
        .botao3 {
            width: 5%;
            height: 3%;
            background-color: rgb(153, 68, 119);
            border: 1.5px solid rgba(0, 0, 0, 0.8);
        }
        
        .botao4 {
            width: 5%;
            height: 3%;
            background-color: rgb(245, 107, 192);
            border: 1.5px solid rgb(0, 0, 0);
        }
    </style>
</head>

<body>
    <fieldset>
        <legend>
            CALCULADORA DA ANA CLARINHA
        </legend>
        <INPUT type="text" id="campo" class="campo"><br><br>

        <button class=botao>1</button>
        <button class=botao>2</button>
        <button class=botao>3</button>
        <button class=botao2>x</button>
        <button class=botao2>^</button>
        <br>
        <button class=botao>4</button>
        <button class=botao>5</button>
        <button class=botao>6</button>
        <button class=botao2>/</button>
        <button class=botao2>(</button>
        <br>
        <button class=botao>7</button>
        <button class=botao>8</button>
        <button class=botao>9</button>
        <button class=botao2>+</button>
        <button class=botao2>)</button>
        <br>
        <button class=botao2>*</button>
        <button class=botao>0</button>
        <button class=botao2>#</button>
        <button class=botao2>-</button>
        <button class=botao2>%</button>
        <br>
        <button class=botao3>C</button>
        <button class=botao4>=</button>

    </fieldset>
</body>

</html>
